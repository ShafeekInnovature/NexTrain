<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTrain - Real-Time Train Schedules</title>
    <meta name="description" content="Find the fastest and most accurate train schedules, routes, and timings for your journey.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background elements -->
    <div class="bg-gradient-orb orb-1"></div>
    <div class="bg-gradient-orb orb-2"></div>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
                <div class="logo-icon"><i class="fa-solid fa-train-subway"></i></div>
                <span>NexTrain</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#schedules">Schedules</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Live Status</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-content">
        <section class="hero-section text-center">
            <span class="badge rounded-pill premium-badge mb-3 py-2 px-3">
                <i class="fa-solid fa-bolt text-warning me-2"></i> Live Updates Available
            </span>
            <h1 class="display-4 fw-bold mb-3 gradient-text">Where are you heading?</h1>
            <p class="lead text-muted mb-5">Find real-time schedules, delays, and platform info instantly.</p>

            <div class="search-card glass-panel p-4 p-md-5 mx-auto">
                <form id="searchForm" class="row g-3 align-items-end">
                    <div class="col-md-4 text-start">
                        <label class="form-label text-light opacity-75 small text-uppercase tracking-wider">Origin</label>
                        <div class="input-group search-input-group">
                            <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-location-dot text-primary"></i></span>
                            <input type="text" class="form-control" id="origin" placeholder="City or Station" required>
                        </div>
                    </div>
                    <div class="col-md-4 text-start">
                        <label class="form-label text-light opacity-75 small text-uppercase tracking-wider">Destination</label>
                        <div class="input-group search-input-group">
                            <span class="input-group-text bg-transparent border-0"><i class="fa-solid fa-location-dot text-danger"></i></span>
                            <input type="text" class="form-control" id="destination" placeholder="City or Station" required>
                        </div>
                    </div>
                    <div class="col-md-3 text-start">
                        <label class="form-label text-light opacity-75 small text-uppercase tracking-wider">Date</label>
                        <input type="date" class="form-control date-input" id="tripDate" required>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary w-100 search-btn d-flex align-items-center justify-content-center h-100">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section id="resultsSection" class="results-section mt-5 d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="h4 fw-bold m-0 d-flex align-items-center gap-2">
                    <i class="fa-solid fa-calendar-check text-success"></i> Available Trains
                </h3>
                <span class="text-muted small" id="resultCounts">Showing 0 results</span>
            </div>
            
            <div id="loadingIndicator" class="text-center py-5 d-none">
                <div class="spinner-border text-primary speed-spinner" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Searching the tracks...</p>
            </div>

            <div class="row g-4" id="trainResults">
                <!-- Results will be populated here -->
            </div>
        </section>
    </main>

    <footer class="footer mt-auto py-4 glass-footer mt-5">
        <div class="container text-center">
            <p class="text-muted mb-0 small">&copy; 2026 NexTrain. Delivering real-time public transit details.</p>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
